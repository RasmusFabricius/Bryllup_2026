name: Rebuild gallery manifest

on:
  workflow_dispatch: {}
  schedule:
    # every 30 minutes (adjust as needed)
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  fetch-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci

      - name: Run fetch-gallery
        env:
          # Provide CLOUDINARY_URL as a repo secret (or set CLOUDINARY_CLOUD_NAME/API key/secret separately)
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        run: |
          node admin/fetch-gallery.js

      - name: Commit and push updated gallery.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/gallery.json
          git commit -m "chore: rebuild gallery.json from Cloudinary (action)" || echo "no changes to commit"
          git push
name: Update Gallery from Cloudinary

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install cloudinary
        run: npm install cloudinary@^2 --no-save

      - name: Run gallery fetcher
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node admin/fetch-gallery.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gallery.json
          git diff --staged --quiet || (git commit -m "chore: update gallery.json from Cloudinary" && git push)
